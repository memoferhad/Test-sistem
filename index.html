<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Sistem Yoxlanışı</title>
</head>
<body>
    <h2>Sistem aktivdir. Məkan icazəsi yoxlanılır...</h2>

    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    
                    // Koordinatları götürəndə ekranda göstərsin
                    alert("Məkan məlumatı alındı: " + lat + ", " + lon);
                    
                    // Bura növbəti addımda datanı bota göndərən funksiyanı bağlayacağıq
                }, function(error) {
                    alert("İcazə verilmədi və ya xəta baş verdi.");
                });
            } else {
                alert("Brauzer məkan funksiyasını dəstəkləmir.");
            }
        };
    </script>
</body>
</html>
